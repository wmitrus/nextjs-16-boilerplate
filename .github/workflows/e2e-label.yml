name: Label Triggered Auth Matrix E2E

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:

jobs:
  e2e-tests:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-e2e'
    name: Playwright Auth Matrix E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Run Auth Matrix E2E Tests
        run: pnpm e2e:auth-matrix:ci
        env:
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          # Add other mandatory E2E env vars here

      - name: Upload Auth Matrix Playwright Artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: playwright-auth-matrix-e2e-artifacts
          path: |
            logs/playwright/
            playwright-report/
            test-results/
          if-no-files-found: ignore
