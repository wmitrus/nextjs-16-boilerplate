name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  check-source-branch:
    name: Prevent PR from main
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        if: github.head_ref == 'main'
        run: |
          echo "Error: Pull requests from the 'main' branch are not allowed."
          exit 1

  validate:
    name: Quality Checks
    needs: check-source-branch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit Tests
        run: pnpm test

      - name: Environment Consistency
        run: pnpm env:check

      - name: Circular Dependency Check (Skott)
        run: pnpm skott:check:only

      - name: Circular Dependency Check (Madge)
        run: pnpm madge

      - name: Unused Dependency Check
        run: pnpm depcheck
