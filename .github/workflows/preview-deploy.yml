name: Preview Deployment

on:
  pull_request:
    branches:
      - main

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  deploy-preview:
    name: Vercel Preview
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # actions/checkout@v5

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Install pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # pnpm/action-setup@v5
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --git-branch=${{ github.head_ref }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Verify Environment
        run: pnpm env:check
        env:
          APP_ENV: preview

      - name: Validate Environment Cross-Field Requirements
        run: pnpm env:validate
        env:
          APP_ENV: preview
          NODE_ENV: production

      - name: Run DB Migrations (Preview)
        shell: bash
        run: |
          set -a
          source .vercel/.env.preview.local
          set +a

          if [ -z "${DATABASE_URL_UNPOOLED:-}" ]; then
            echo "DATABASE_URL_UNPOOLED is missing after vercel pull for preview."
            exit 1
          fi

          node <<'EOF'
          const previewBranch = process.env.GITHUB_HEAD_REF ?? '(unknown)';
          const rawUrl = process.env.DATABASE_URL_UNPOOLED;

          try {
            const parsed = new URL(rawUrl);
            const databaseName = parsed.pathname.replace(/^\//, '') || '(none)';
            console.log(
              `[preview-migrations] branch=${previewBranch} host=${parsed.hostname} database=${databaseName}`,
            );
          } catch {
            console.error(
              '[preview-migrations] Failed to parse DATABASE_URL_UNPOOLED.',
            );
            process.exit(1);
          }
          EOF

          export DATABASE_URL="$DATABASE_URL_UNPOOLED"
          pnpm db:migrate:prod

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          APP_ENV: preview
          NEXT_PUBLIC_APP_ENV: preview
          SKIP_ENV_VALIDATION: false

      - name: Deploy to Vercel
        id: vercel_deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$DEPLOY_URL" >> $GITHUB_OUTPUT

      - name: Run Lighthouse Audit
        if: success()
        run: |
          echo "Running Lighthouse audit on URL: ${{ steps.vercel_deploy.outputs.preview_url }}"
          npx @lhci/cli autorun --collect.url=${{ steps.vercel_deploy.outputs.preview_url }} --collect.settings.extraHeaders='{"x-vercel-protection-bypass": "'"${VERCEL_AUTOMATION_BYPASS_SECRET}"'", "x-vercel-set-bypass-cookie": "samesitenone"}'
        env:
          LHCI_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LHCI_TOKEN: ${{ secrets.LHCI_TOKEN }}
          LHCI_SERVER_BASE_URL: ${{ vars.LHCI_SERVER_BASE_URL }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
